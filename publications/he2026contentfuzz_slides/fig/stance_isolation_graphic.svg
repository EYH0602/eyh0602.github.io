<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">Stance classifier routing posts into affinity cocoons</title>
  <desc id="desc">Mixed-stance posts enter a stance classifier and are routed into three homogeneous affinity cocoons.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#022851"/>
    </marker>
    <marker id="arrowhead-gold" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C4820E"/>
    </marker>
    <marker id="arrowhead-teal" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f6c75"/>
    </marker>

    <!-- Single post nodes per stance color -->
    <g id="post-blue">
      <rect x="-13" y="-10" width="26" height="20" rx="3" fill="#022851" stroke="#022851" stroke-width="1.5"/>
    </g>
    <g id="post-gold">
      <rect x="-13" y="-10" width="26" height="20" rx="3" fill="#C4820E" stroke="#C4820E" stroke-width="1.5"/>
    </g>
    <g id="post-teal">
      <rect x="-13" y="-10" width="26" height="20" rx="3" fill="#3f6c75" stroke="#3f6c75" stroke-width="1.5"/>
    </g>
  </defs>

  <style>
    .label { font-family: "XCharter","Charter","Georgia",serif; fill: #022851; font-weight: 700; }
    .sub   { font-family: "XCharter","Charter","Georgia",serif; fill: #3b4f6b; font-style: italic; }
  </style>

  <!-- ============== Section headers (aligned) ============== -->
  <text x="135" y="38" text-anchor="middle" class="label" font-size="24">Incoming posts</text>
  <text x="135" y="62" text-anchor="middle" class="sub" font-size="16">mixed stances</text>

  <text x="960" y="38" text-anchor="middle" class="label" font-size="24">Affinity Cocoons</text>
  <text x="960" y="62" text-anchor="middle" class="sub" font-size="16">homogeneous, isolated</text>

  <!-- ============== LEFT: mixed input posts ============== -->
  <g>
    <use href="#post-gold" x="80"  y="180"/>
    <use href="#post-blue" x="135" y="165"/>
    <use href="#post-teal" x="195" y="190"/>
    <use href="#post-blue" x="90"  y="230"/>
    <use href="#post-gold" x="155" y="220"/>
    <use href="#post-teal" x="115" y="275"/>
    <use href="#post-blue" x="180" y="270"/>
    <use href="#post-gold" x="85"  y="325"/>
    <use href="#post-teal" x="150" y="325"/>
    <use href="#post-blue" x="200" y="335"/>
    <use href="#post-gold" x="120" y="375"/>
    <use href="#post-blue" x="180" y="390"/>

    <!-- Funnel-style flow lines from input cluster toward classifier -->
    <g fill="none" stroke="#3b4f6b" stroke-width="1.6" opacity="0.55">
      <path d="M 220 195 C 290 205 330 230 380 260"/>
      <path d="M 220 245 C 290 255 330 270 380 280"/>
      <path d="M 220 295 H 380"/>
      <path d="M 220 345 C 290 335 330 310 380 300"/>
      <path d="M 220 395 C 290 375 330 340 380 320"/>
    </g>
  </g>

  <!-- ============== CENTER: classifier ============== -->
  <g>
    <rect x="380" y="230" width="200" height="120" rx="6"
          fill="#ffffff" stroke="#022851" stroke-width="3"/>
    <text x="480" y="278" text-anchor="middle" class="label" font-size="26">Stance</text>
    <text x="480" y="314" text-anchor="middle" class="label" font-size="26">Classifier</text>
    <text x="480" y="382" text-anchor="middle" class="sub" font-size="16">routes by predicted stance</text>
  </g>

  <!-- ============== ROUTING ARROWS to 3 cocoons ============== -->
  <g fill="none" stroke-width="4">
    <path d="M 580 265 C 680 265 700 160 800 160" stroke="#C4820E" marker-end="url(#arrowhead-gold)"/>
    <path d="M 580 290 H 800" stroke="#022851" marker-end="url(#arrowhead)"/>
    <path d="M 580 315 C 680 315 700 420 800 420" stroke="#3f6c75" marker-end="url(#arrowhead-teal)"/>
  </g>

  <!-- ============== RIGHT: three homogeneous cocoons ============== -->
  <g transform="translate(960,160)">
    <circle r="80" fill="#fdf6e6" stroke="#C4820E" stroke-width="2.5"/>
    <use href="#post-gold" x="-35" y="-25"/>
    <use href="#post-gold" x="25"  y="-30"/>
    <use href="#post-gold" x="-50" y="20"/>
    <use href="#post-gold" x="10"  y="15"/>
    <use href="#post-gold" x="45"  y="30"/>
    <use href="#post-gold" x="-20" y="45"/>
  </g>

  <g transform="translate(960,290)">
    <circle r="80" fill="#eaf0f7" stroke="#022851" stroke-width="2.5"/>
    <use href="#post-blue" x="-35" y="-25"/>
    <use href="#post-blue" x="25"  y="-30"/>
    <use href="#post-blue" x="-50" y="20"/>
    <use href="#post-blue" x="10"  y="15"/>
    <use href="#post-blue" x="45"  y="30"/>
    <use href="#post-blue" x="-20" y="45"/>
  </g>

  <g transform="translate(960,420)">
    <circle r="80" fill="#eaf1f2" stroke="#3f6c75" stroke-width="2.5"/>
    <use href="#post-teal" x="-35" y="-25"/>
    <use href="#post-teal" x="25"  y="-30"/>
    <use href="#post-teal" x="-50" y="20"/>
    <use href="#post-teal" x="10"  y="15"/>
    <use href="#post-teal" x="45"  y="30"/>
    <use href="#post-teal" x="-20" y="45"/>
  </g>
</svg>
